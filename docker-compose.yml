services:
  socket-proxy:
    image: wollomatic/socket-proxy:1
    container_name: claude-socket-proxy
    command:
      - '-listenip=0.0.0.0'
      - '-allowfrom=claude-filter-proxy'
      - '-allowGET=/(v1\..{1,2}/)?(version|info|containers(/.*)?|images(/.*)?|networks(/.*)?|volumes(/.*)?|build.*|exec/.*|events.*|_ping)'
      - '-allowPOST=/(v1\..{1,2}/)?(containers(/.*)?|images(/.*)?|networks(/.*)?|volumes(/.*)?|build.*|exec/.*|_ping)'
      - '-allowPUT=/(v1\..{1,2}/)?(containers(/.*)?)'
      - '-allowDELETE=/(v1\..{1,2}/)?(containers(/.*)?|images(/.*)?|networks(/.*)?|volumes(/.*)?)'
      - '-allowHEAD=/(v1\..{1,2}/)?(containers(/.*)?|images(/.*)?|_ping)'
      - '-allowbindmountfrom=${ALLOWED_BIND_MOUNTS}'
      - '-loglevel=INFO'
    user: "0"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - claude-internal-net
    read_only: true
    tmpfs:
      - /run
    restart: unless-stopped

  filter-proxy:
    container_name: claude-filter-proxy
    build:
      context: ./docker-filter-proxy
    environment:
      DOCKER_FILTER_UPSTREAM: http://claude-socket-proxy:2375
      DOCKER_FILTER_LISTEN: 0.0.0.0:2375
    depends_on:
      - socket-proxy
    ports:
      - "127.0.0.1:${DOCKER_FILTER_PROXY_PORT:-12375}:2375"
    networks:
      - claude-internal-net
      - claude-net
    read_only: true
    restart: unless-stopped

  claude:
    container_name: claude-docker
    init: true
    build:
      context: .
      dockerfile: Dockerfile
      args:
        HOST_UID: ${HOST_UID}
        HOST_USER: ${HOST_USER}
        HOST_HOME: ${HOST_HOME}
        GO_VERSION: ${GO_VERSION}
        CONTAINER_SHELL: ${CONTAINER_SHELL:-/bin/bash}
        EXTRA_PACKAGES: ${EXTRA_PACKAGES:-}
        CC_VERSION: ${CC_VERSION:-}
    volumes:
      - ${CLAUDE_JSON_PATH}:/run/.claude.json.host:ro
      - ${CLAUDE_CONFIG_DIR_HOST}:${CLAUDE_CONFIG_DIR_HOST}
      - ${GOPATH}/pkg:${HOST_HOME}/go/pkg
      - ./gpg-keys:/run/gpg-keys:ro
      - ./config/claude-notifier:/usr/local/bin/claude-notifier:ro
      - ./config/custom-bin:/usr/local/custom-bin:ro
      - ${HOST_HOME}/.config/caveman:${HOST_HOME}/.config/caveman:ro
    working_dir: ${HOST_HOME}
    environment:
      DOCKER_HOST: tcp://host.docker.internal:${DOCKER_FILTER_PROXY_PORT:-12375}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      GIT_USER_NAME: ${GIT_USER_NAME:-}
      GIT_USER_EMAIL: ${GIT_USER_EMAIL:-}
      GIT_PROTECTED_BRANCHES: ${GIT_PROTECTED_BRANCHES:-main master}
      GOPRIVATE: ${GOPRIVATE:-}
      GONOSUMDB: ${GONOSUMDB:-}
      GOPATH: ${HOST_HOME}/go
      HOST_USER: ${HOST_USER}
      HOST_HOME: ${HOST_HOME}
      CLAUDE_CONFIG_DIR: ${CLAUDE_CONFIG_DIR:-}
      SSH_RELAY_HOST: ${SSH_RELAY_HOST:-}
      SSH_RELAY_PORT: ${SSH_RELAY_PORT:-}
      SSH_AUTH_SOCK: /tmp/ssh-agent.sock
      CONTAINER_SHELL: ${CONTAINER_SHELL:-/bin/bash}
      AWS_CRED_PROXY_PROFILES: ${AWS_CRED_PROXY_PROFILES:-}
      AWS_CRED_PROXY_PORT: ${AWS_CRED_PROXY_PORT:-9998}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    mem_limit: ${DOCKER_MEMORY_LIMIT:-0}
    depends_on:
      - filter-proxy
    networks:
      - claude-net

networks:
  claude-internal-net:
  claude-net:
